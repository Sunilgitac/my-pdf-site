<!DOCTYPE html>
<html>
<head>
    <title>My PDF Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen">

     <div class="bg-white p-8 rounded-lg shadow-xl text-center max-w-md w-full">
    <h1 class="text-3xl font-bold text-indigo-600 mb-4">JPG to PDF</h1>
    <p class="text-gray-600 mb-6">Select a JPG image to convert it into a PDF instantly.</p>

    <input type="file" id="imageInput" accept=".jpg,.jpeg" class="mb-4 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-700 hover:file:bg-indigo-100">

    <button onclick="uploadAndConvert()" id="convertBtn" class="bg-indigo-600 text-white px-6 py-2 rounded-lg font-bold hover:bg-indigo-700 w-full transition">
        Convert to PDF
    </button>

    <div id="progressContainer" class="mt-6 hidden">
        <div class="w-full bg-gray-200 rounded-full h-2.5">
            <div id="progressBar" class="bg-indigo-600 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>
        <p id="status" class="mt-2 text-sm text-gray-500 italic font-medium">Preparing your file...</p>
    </div>

    <div id="successIcon" class="mt-4 hidden flex-col items-center">
        <div class="h-12 w-12 rounded-full bg-green-100 flex items-center justify-center mb-2">
            <svg class="h-8 w-8 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        <p class="text-green-600 font-bold">Conversion Complete!</p>
    </div>
</div>

    <script>
async function uploadAndConvert() {
    const fileInput = document.getElementById('imageInput');
    const status = document.getElementById('status');
    const btn = document.getElementById('convertBtn');
    const progContainer = document.getElementById('progressContainer');
    const progBar = document.getElementById('progressBar');
    const successIcon = document.getElementById('successIcon');

    if (fileInput.files.length === 0) {
        alert("Please select a JPG file first!");
        return;
    }

    // 1. Reset and Show Progress
    successIcon.classList.add('hidden');
    progContainer.classList.remove('hidden');
    btn.disabled = true;
    btn.classList.add('opacity-50');
    
    // Simulate progress starting
    progBar.style.width = "30%";
    status.innerText = "Uploading to server...";

    const formData = new FormData();
    formData.append('file', fileInput.files[0]);

    try {
        // Update progress halfway
        progBar.style.width = "60%";
        status.innerText = "Brain is converting image to PDF...";

        const response = await fetch('https://my-pdf-site-production.up.railway.app/convert/jpg-to-pdf', {
            method: 'POST',
            body: formData
        });

        if (response.ok) {
            progBar.style.width = "100%";
            status.innerText = "Downloading PDF...";
            
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "converted_file.pdf";
            document.body.appendChild(a);
            a.click();
            a.remove();

            // 2. Show Success Animation
            progContainer.classList.add('hidden');
            successIcon.classList.remove('hidden');
        } else {
            status.innerText = "Error: Conversion failed.";
        }
    } catch (error) {
        console.error(error);
        status.innerText = "Error: Connection lost.";
    } finally {
        btn.disabled = false;
        btn.classList.remove('opacity-50');
    }
}    
    </script>
</body>
</html>
