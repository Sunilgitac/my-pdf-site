[phases.setup]
nixPkgs = [
    "python313", 
    "libreoffice-bin",
    "cairo",
    "pkg-config",
    "pango",
    "glib",
    "gobject-introspection"
]

[variables]
PKG_CONFIG_PATH = "/usr/lib/pkgconfig:/usr/share/pkgconfig:/nix/var/nix/profiles/default/lib/pkgconfig"
# This helps the compiler find the actual cairo.h headers
C_INCLUDE_PATH = "/nix/var/nix/profiles/default/include"
LIBRARY_PATH = "/nix/var/nix/profiles/default/lib"
